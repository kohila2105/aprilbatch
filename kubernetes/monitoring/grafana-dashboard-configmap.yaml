apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  sample-app-dashboard.json: |
    {
      "dashboard": {
        "title": "Sample Application Metrics",
        "tags": ["sample", "demo"],
        "timezone": "browser",
        "schemaVersion": 16,
        "version": 0,
        "refresh": "5s",
        "panels": [
          {
            "title": "HTTP Request Rate",
            "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
            "targets": [
              {
                "expr": "rate(http_requests_total{job=\"sample-app\"}[1m])",
                "legendFormat": "{{method}} {{code}}"
              }
            ],
            "type": "graph",
            "id": 1
          },
          {
            "title": "HTTP Request Duration",
            "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=\"sample-app\"}[1m]))",
                "legendFormat": "95th percentile"
              }
            ],
            "type": "graph",
            "id": 2
          },
          {
            "title": "Active Pods",
            "gridPos": {"x": 0, "y": 8, "w": 6, "h": 6},
            "targets": [
              {
                "expr": "count(up{job=\"sample-app\"} == 1)"
              }
            ],
            "type": "singlestat",
            "id": 3
          },
          {
            "title": "Total Requests",
            "gridPos": {"x": 6, "y": 8, "w": 6, "h": 6},
            "targets": [
              {
                "expr": "sum(http_requests_total{job=\"sample-app\"})"
              }
            ],
            "type": "singlestat",
            "id": 4
          },
          {
            "title": "Memory Usage",
            "gridPos": {"x": 12, "y": 8, "w": 12, "h": 6},
            "targets": [
              {
                "expr": "process_resident_memory_bytes{job=\"sample-app\"}",
                "legendFormat": "{{instance}}"
              }
            ],
            "type": "graph",
            "id": 5
          }
        ]
      }
    }
